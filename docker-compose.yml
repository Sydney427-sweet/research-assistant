version: "3.9"

services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./docs:/app/docs        # mount your PDFs
      - ./.chroma:/app/.chroma  # persist the vector DB
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama  # persist downloaded models

volumes:
  ollama_data:
