services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./docs:/app/docs
      - ./.chroma:/app/.chroma
      - ./logs:/app/logs
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama

  metrics:
    build: .
    ports:
      - "8502:8502"
    volumes:
      - ./logs:/app/logs
    command: ["streamlit", "run", "metrics.py", "--server.port=8502", "--server.address=0.0.0.0"]
    depends_on:
      - app

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
